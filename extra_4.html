<!DOCTYPE html>

            padding: 30px 20px;

            margin: 0;

        .container { max-width: 500px; margin: 0 auto; text-align: left; }
        .status-box {

        }

        /* 🔢 入力エリア・配置の最適化 */
        .quiz-box {
            border: 2px solid #ffff00; padding: 20px; background: #050505; margin-top: 25px;
            display: flex; flex-direction: column; align-items: center; /* 縦一列・中央揃え */

        input[type="text"] { 
            background: #000000; border: 1px solid #00ff00; color: #00ff00; 
            padding: 12px; width: 100%; max-width: 300px; box-sizing: border-box;
            text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 15px;
        }
        button { 
            background: #ffff00; color: #000000; border: none; padding: 12px; 
            width: 100%; max-width: 300px; box-sizing: border-box;
            font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s;
        }
        button:active { background: #cccc00; }
        
        .epilogue-box {
            border: 2px double #00ff00; padding: 25px; background: #030a03; margin-top: 20px;
        }
        .line-btn {
            background: #06c755; color: #ffffff; border: none; padding: 14px;

                <div style="text-align: center; margin-top: 25px; display: flex; flex-direction: column; align-items: center;">
                    <p style="font-size: 16px; font-weight: bold; color: #ffffff; margin-bottom: 5px;">✨ TRUE GAME CLEAR ✨</p>
                    <button class="line-btn" onclick="location.href='https://line.me/ti/g2/bbgZKGvvlxOULcSiD-vSejwxDlQ41cjAwA7Gkw?utm_source=invitation&utm_medium=link_copy&utm_campaign=default'">
